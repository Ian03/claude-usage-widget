<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="widget.css" />
  <style>
    /* Capture page background — picked to look like a clean desktop. */
    html, body {
      background: linear-gradient(135deg, #2a3b52 0%, #1f3144 50%, #233447 100%);
      overflow: hidden;
    }
    body { margin: 0; padding: 24px; min-height: 100vh; }
    .toast {
      position: absolute;
      right: 24px;
      bottom: 24px;
      width: 280px;
      padding: 12px 14px;
      background: rgba(28, 28, 32, 0.94);
      color: #e9ecef;
      border-left: 3px solid var(--critical, #E5484D);
      border-radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      transform: translateY(20px);
      opacity: 0;
      transition: transform 0.35s, opacity 0.35s;
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast .t-title { font-weight: 600; margin-bottom: 2px; color: #fff; }
    .toast .t-body { color: #cbd5e1; }
  </style>
</head>
<body>
  <div id="root" class="widget" data-theme="dark" data-layout="expanded">
    <header class="drag">
      <div class="title">
        <span class="dot" id="statusDot"></span>
        <span>Claude usage</span>
      </div>
      <div class="actions">
        <button class="icon-btn"><svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M12 5V2L7 7l5 5V8a4 4 0 1 1-4 4H6a6 6 0 1 0 6-7z"/></svg></button>
        <button class="icon-btn"><svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19.14 12.94a7.11 7.11 0 0 0 0-1.88l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.61-.22l-2.39.96a7 7 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54a7 7 0 0 0-1.62.94l-2.39-.96a.5.5 0 0 0-.61.22L2.65 8.84a.5.5 0 0 0 .12.64l2.03 1.58a7.11 7.11 0 0 0 0 1.88L2.77 14.52a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .61.22l2.39-.96c.49.38 1.04.7 1.62.94l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54a7 7 0 0 0 1.62-.94l2.39.96a.5.5 0 0 0 .61-.22l1.92-3.32a.5.5 0 0 0-.12-.64zM12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7z"/></svg></button>
        <button class="icon-btn"><svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
      </div>
    </header>
    <div class="body">
      <div id="limits" class="limits"></div>
      <div class="footer">
        <span id="lastUpdated">Updated just now</span>
      </div>
    </div>

    <!-- Claw'd reacts to the worst-limit severity. Mood is set via
         root.dataset.mascotMood in the render() loop below. -->
    <div class="mascot" id="mascot" title="Claw'd">
      <div class="mascot-zzz" aria-hidden="true">
        <span class="z" style="--zd:0s">z</span>
        <span class="z" style="--zd:-0.8s">Z</span>
        <span class="z" style="--zd:-1.6s">Z</span>
      </div>
      <div class="mascot-walk">
        <span class="panic-mark">!</span>
        <span class="panic-mark">!</span>
        <span class="panic-mark">!</span>
        <div class="mascot-sweat" aria-hidden="true">
          <svg viewBox="0 0 12 16" width="18" height="24">
            <defs>
              <radialGradient id="sweat-grad-demo" cx="0.35" cy="0.65" r="0.55">
                <stop offset="0%"  stop-color="#eaf5ff"/>
                <stop offset="55%" stop-color="#5ec0ff"/>
                <stop offset="100%" stop-color="#1e7fc8"/>
              </radialGradient>
            </defs>
            <path d="M 6 1 C 1.5 6 0.5 11 1.5 13.5 A 5 5 0 0 0 10.5 13.5 C 11.5 11 10.5 6 6 1 Z"
                  fill="url(#sweat-grad-demo)" stroke="#1565a3" stroke-width="0.5"/>
            <ellipse cx="4" cy="10.5" rx="1.4" ry="2" fill="#fff" opacity="0.6"/>
          </svg>
        </div>
        <div class="mascot-bob">
          <svg viewBox="0 0 14 11" width="40" height="32" shape-rendering="crispEdges">
            <rect class="body" x="1" y="0" width="12" height="8" fill="currentColor"/>
            <rect class="bump" x="0" y="2" width="1" height="4" fill="currentColor"/>
            <rect class="bump" x="13" y="2" width="1" height="4" fill="currentColor"/>
            <rect class="eye" x="3" y="2" width="1" height="2" fill="#000"/>
            <rect class="eye" x="10" y="2" width="1" height="2" fill="#000"/>
            <line class="eye-shut" x1="2.2" y1="3.2" x2="5" y2="3.2" stroke="#000" stroke-width="0.8" stroke-linecap="round"/>
            <line class="eye-shut" x1="9" y1="3.2" x2="11.8" y2="3.2" stroke="#000" stroke-width="0.8" stroke-linecap="round"/>
            <rect class="leg" x="2" y="8" width="1" height="3" fill="currentColor"/>
            <rect class="leg" x="5" y="8" width="1" height="3" fill="currentColor"/>
            <rect class="leg" x="8" y="8" width="1" height="3" fill="currentColor"/>
            <rect class="leg" x="11" y="8" width="1" height="3" fill="currentColor"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="t-title" id="toastTitle">Current session at 91%</div>
    <div class="t-body">Critical threshold reached.</div>
  </div>

  <script>
    const TIMELINE = [
      { t: 0,    session: 42 },
      { t: 1.0,  session: 61 },
      { t: 2.0,  session: 78 },
      { t: 3.0,  session: 91, toast: true },
      { t: 5.0,  session: 91 },
      { t: 5.5,  session: 42, hideToast: true },
    ];
    const WEEKLY = 18, SONNET = 11, EXTRA = 4;
    const WARN = 75, CRIT = 90;
    const ACCENT = '#38AEEB', OK = '#3DDC84', WARNC = '#F5B400', CRITC = '#E5484D';

    function sev(p) { return p >= CRIT ? 'critical' : p >= WARN ? 'warn' : 'ok'; }
    function color(s) { return s === 'critical' ? CRITC : s === 'warn' ? WARNC : OK; }

    function lerp(a, b, t) { return a + (b - a) * t; }
    function ease(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }

    function stateAt(time) {
      let prev = TIMELINE[0], next = TIMELINE[TIMELINE.length - 1];
      for (let i = 0; i < TIMELINE.length - 1; i++) {
        if (TIMELINE[i].t <= time && TIMELINE[i + 1].t > time) {
          prev = TIMELINE[i];
          next = TIMELINE[i + 1];
          break;
        }
      }
      const span = next.t - prev.t;
      const localT = span > 0 ? (time - prev.t) / span : 1;
      const eased = ease(Math.max(0, Math.min(1, localT)));
      return {
        session: lerp(prev.session, next.session, eased),
        weekly: WEEKLY,
        sonnet: SONNET,
        extra: EXTRA,
        toast: !!(prev.toast && !next.hideToast),
      };
    }

    function render(state) {
      const limits = [
        { label: 'Current session', pct: state.session, meta: 'resets in 2h 14m' },
        { label: 'Weekly · all models', pct: state.weekly, meta: 'resets in 6d' },
        { label: 'Weekly · Sonnet', pct: state.sonnet, meta: 'resets in 6d' },
        { label: 'Extra usage', pct: state.extra, meta: '' },
      ];

      const root = document.getElementById('limits');
      const dot = document.getElementById('statusDot');
      let worst = 'ok';
      const html = limits.map((l) => {
        const s = sev(l.pct);
        if (s === 'critical') worst = 'critical';
        else if (s === 'warn' && worst !== 'critical') worst = 'warn';
        const pace = Math.min(100, (l.pct === state.session ? 55 : l.label.includes('Weekly') ? 60 : 0));
        const over = l.pct > pace + 5;
        return `
          <div class="limit">
            <div class="limit-head">
              <span class="limit-label">${l.label}</span>
              <span class="limit-pct">${l.pct.toFixed(0)}%</span>
            </div>
            <div class="bar">
              <div class="bar-fill ${s === 'ok' ? '' : s}" style="width:${l.pct}%"></div>
              ${pace > 0 ? `<div class="pace ${over ? 'over' : ''}" style="left:${pace}%"></div>` : ''}
            </div>
            ${l.meta ? `<div class="limit-meta"><span>${l.meta}</span></div>` : ''}
          </div>`;
      }).join('');
      root.innerHTML = html;
      dot.className = `dot ${worst}`;

      // Drive Claw'd's mood from the worst severity. He paces casually at
      // ok, hurries at warn (with sweat), panic-skips at critical with
      // floating "!" marks.
      document.getElementById('root').dataset.mascotMood = worst;

      const toast = document.getElementById('toast');
      const title = document.getElementById('toastTitle');
      title.textContent = `Current session at ${state.session.toFixed(0)}%`;
      toast.classList.toggle('show', state.toast);
    }

    // Drive the animation. Updated by the capture script via window.setFrameTime.
    let currentTime = 0;
    window.setFrameTime = function (t) {
      currentTime = t;
      render(stateAt(t));
    };
    // Initial render for any direct viewing.
    render(stateAt(0));
  </script>
</body>
</html>
