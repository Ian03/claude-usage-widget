<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <link rel="stylesheet" href="widget.css" />
  <title>Claude Usage</title>
</head>
<body>
  <div id="root" class="widget" data-theme="dark">
    <div class="pill" id="pill" title="Drag to move · click chevron to expand">
      <span class="pill-dot" id="pillDot"></span>
      <span class="pill-pct" id="pillPct">—</span>
      <span class="pill-label" id="pillLabel"></span>
      <button class="icon-btn no-drag" id="expandBtn" title="Expand">
        <svg viewBox="0 0 24 24" width="12" height="12"><path fill="currentColor" d="M7 14l5-5 5 5z"/></svg>
      </button>
    </div>

    <header class="drag" id="dragHandle">
      <div class="title">
        <span class="dot" id="statusDot"></span>
        <span id="titleText">Claude usage</span>
      </div>
      <div class="actions no-drag">
        <button class="icon-btn" id="refreshBtn" title="Refresh">
          <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M12 5V2L7 7l5 5V8a4 4 0 1 1-4 4H6a6 6 0 1 0 6-7z"/></svg>
        </button>
        <button class="icon-btn" id="settingsBtn" title="Settings">
          <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19.14 12.94a7.11 7.11 0 0 0 0-1.88l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.61-.22l-2.39.96a7 7 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54a7 7 0 0 0-1.62.94l-2.39-.96a.5.5 0 0 0-.61.22L2.65 8.84a.5.5 0 0 0 .12.64l2.03 1.58a7.11 7.11 0 0 0 0 1.88L2.77 14.52a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .61.22l2.39-.96c.49.38 1.04.7 1.62.94l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54a7 7 0 0 0 1.62-.94l2.39.96a.5.5 0 0 0 .61-.22l1.92-3.32a.5.5 0 0 0-.12-.64zM12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7z"/></svg>
        </button>
        <button class="icon-btn" id="minimizeBtn" title="Minimize to pill">
          <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19 13H5v-2h14v2z"/></svg>
        </button>
        <button class="icon-btn" id="closeBtn" title="Hide">
          <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
    </header>

    <div class="body">
      <div id="limits" class="limits"></div>

      <div class="graph-wrap" id="graphWrap" hidden>
        <div class="graph-head">
          <span id="graphTitle">7-day history</span>
          <span class="graph-sub" id="graphSub"></span>
        </div>
        <svg id="graph" class="graph" viewBox="0 0 260 60" preserveAspectRatio="none"></svg>
        <div class="graph-empty" id="graphEmpty" hidden>Collecting data…</div>
      </div>

      <div class="footer">
        <span id="lastUpdated">—</span>
        <span class="badge soft" id="staleBadge" hidden>syncing</span>
        <span class="badge" id="errorBadge" hidden></span>
      </div>
    </div>

    <!-- Claw'd, the resident crab. Pixel-art SVG inspired by the Claude
         mascot. Walks the widget's bottom edge, tints with severity,
         waves on quota reset, hops when clicked. Mood-specific accessories
         (panic marks, sweat drop, ZZZ, grumpy bubble) live inside the same
         container so they share his z-index and reflow with him. -->
    <div class="mascot" id="mascot" title="Claw'd">
      <div class="mascot-zzz" aria-hidden="true">z</div>
      <div class="mascot-msg" id="mascotMsg" hidden></div>
      <div class="mascot-walk">
        <span class="panic-mark">!</span>
        <span class="panic-mark">!</span>
        <span class="panic-mark">!</span>
        <div class="mascot-sweat" aria-hidden="true"></div>
        <div class="mascot-bob">
          <svg viewBox="0 0 14 11" width="40" height="32" shape-rendering="crispEdges">
            <rect class="body" x="1" y="0" width="12" height="8" fill="currentColor"/>
            <rect class="bump" x="0" y="2" width="1" height="4" fill="currentColor"/>
            <rect class="bump" x="13" y="2" width="1" height="4" fill="currentColor"/>
            <rect class="eye" x="3" y="2" width="1" height="2" fill="#000"/>
            <rect class="eye" x="10" y="2" width="1" height="2" fill="#000"/>
            <line class="eye-shut" x1="2.2" y1="3.2" x2="5" y2="3.2" stroke="#000" stroke-width="0.8" stroke-linecap="round"/>
            <line class="eye-shut" x1="9" y1="3.2" x2="11.8" y2="3.2" stroke="#000" stroke-width="0.8" stroke-linecap="round"/>
            <rect class="leg" x="2" y="8" width="1" height="3" fill="currentColor"/>
            <rect class="leg" x="5" y="8" width="1" height="3" fill="currentColor"/>
            <rect class="leg" x="8" y="8" width="1" height="3" fill="currentColor"/>
            <rect class="leg" x="11" y="8" width="1" height="3" fill="currentColor"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <script src="widget.js"></script>
</body>
</html>
