name: Update CHANGELOG

on:
  push:
    branches: [main]

# auto-changelog rebuilds CHANGELOG.md from git history. When the file changes
# the bot pushes it back to main. GitHub does not re-trigger workflows from
# GITHUB_TOKEN-authored commits, so this is loop-safe by default. The config
# in package.json also filters out the bot's own commits from the body, so a
# regen on top of a regen is a no-op.
jobs:
  changelog:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          # auto-changelog needs the full history + tags to render compare URLs
          # and section per release. The default shallow clone hides them.
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Regenerate CHANGELOG.md
        run: npx --yes auto-changelog

      - name: Commit if changed
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "No CHANGELOG.md changes; skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG.md"
          git push
